# Read the Docs build configuration. https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

# Only the doc deps are installed; JAX/blackjax/optax are mocked in conf.py, and
# bii is imported from ./src via sys.path (no package install needed).
python:
  install:
    - requirements: docs/requirements.txt

formats:
  - pdf
